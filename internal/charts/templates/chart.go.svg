<svg xmlns="http://www.w3.org/2000/svg" width="{{.Width}}" height="{{.Height}}" viewBox="0 0 {{.Width}} {{.Height}}" role="img" aria-label="{{.Title | escape}}">
<rect width="100%" height="100%" fill="#020617"/>
<text x="{{.LeftPad}}" y="{{.TitleY}}" font-family="sans-serif" font-size="16" fill="#f8fafc">{{.Title | escape}}</text>
<line x1="{{.LeftPad}}" y1="{{.TopPad}}" x2="{{.LeftPad}}" y2="{{.AxisBottom}}" stroke="#334155" stroke-width="1"/>
<line x1="{{.LeftPad}}" y1="{{.AxisBottom}}" x2="{{.AxisRight}}" y2="{{.AxisBottom}}" stroke="#334155" stroke-width="1"/>
<text x="8" y="{{.TopPadLabelY}}" font-family="sans-serif" font-size="11" fill="#94a3b8">{{.MaxLabel}}</text>
<text x="8" y="{{.BottomPadLabelY}}" font-family="sans-serif" font-size="11" fill="#94a3b8">{{.MinLabel}}</text>
<text x="{{.LeftPad}}" y="{{.XLabelY}}" font-family="sans-serif" font-size="11" fill="#94a3b8">{{.StartAt}}</text>
<text x="{{.AxisRight}}" y="{{.XLabelY}}" text-anchor="end" font-family="sans-serif" font-size="11" fill="#94a3b8">{{.EndAt}}</text>
{{- if .HasData }}
{{- range .Series }}
<path fill="none" stroke="{{.Color}}" stroke-width="{{.StrokeWidth}}" stroke-opacity="{{.StrokeOpacity}}" stroke-linecap="round" stroke-linejoin="round" d="{{.Path}}"/>
{{- end }}
{{- else }}
<text x="{{.CenterX}}" y="{{.CenterY}}" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">no data</text>
{{- end }}
{{- if .HasStats }}
{{- range .Stats }}
<text x="{{.X}}" y="{{$.StatLabelY}}" font-family="sans-serif" font-size="12" fill="#94a3b8">{{.Label | escape}}</text>
<text x="{{.X}}" y="{{$.StatValueY}}" font-family="sans-serif" font-size="30" font-weight="700" fill="#f8fafc">{{.Formatted | escape}}</text>
{{- end }}
{{- end }}
</svg>
