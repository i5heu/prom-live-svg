<svg xmlns="http://www.w3.org/2000/svg" width="{{.Width}}" height="{{.Height}}" viewBox="0 0 {{.Width}} {{.Height}}" role="img" aria-label="{{.Title | escape}}">
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="{{.LeftPad}}" y="{{.TitleY}}" font-family="sans-serif" font-size="16" fill="#111827">{{.Title | escape}}</text>
<line x1="{{.LeftPad}}" y1="{{.TopPad}}" x2="{{.LeftPad}}" y2="{{.AxisBottom}}" stroke="#d1d5db" stroke-width="1"/>
<line x1="{{.LeftPad}}" y1="{{.AxisBottom}}" x2="{{.AxisRight}}" y2="{{.AxisBottom}}" stroke="#d1d5db" stroke-width="1"/>
<text x="8" y="{{.TopPadLabelY}}" font-family="sans-serif" font-size="11" fill="#6b7280">{{.MaxLabel}}</text>
<text x="8" y="{{.BottomPadLabelY}}" font-family="sans-serif" font-size="11" fill="#6b7280">{{.MinLabel}}</text>
<text x="{{.LeftPad}}" y="{{.XLabelY}}" font-family="sans-serif" font-size="11" fill="#6b7280">{{.StartAt}}</text>
<text x="{{.AxisRight}}" y="{{.XLabelY}}" text-anchor="end" font-family="sans-serif" font-size="11" fill="#6b7280">{{.EndAt}}</text>
{{- if .HasData }}
{{- range .Series }}
<polyline fill="none" stroke="{{.Color}}" stroke-width="{{.StrokeWidth}}" stroke-opacity="{{.StrokeOpacity}}" points="{{.Points}}"/>
{{- end }}
{{- else }}
<text x="{{.CenterX}}" y="{{.CenterY}}" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6b7280">no data</text>
{{- end }}
{{- if .HasStats }}
{{- range .Stats }}
<text x="{{.X}}" y="{{$.StatLabelY}}" font-family="sans-serif" font-size="12" fill="#6b7280">{{.Label | escape}}</text>
<text x="{{.X}}" y="{{$.StatValueY}}" font-family="sans-serif" font-size="30" font-weight="700" fill="#111827">{{.Formatted | escape}}</text>
{{- end }}
{{- end }}
</svg>
