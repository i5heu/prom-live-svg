service:
    name: prom-live-svg
    environment: development

http:
    listen_addr: ":8080"
    read_header_timeout: 5s
    read_timeout: 10s
    write_timeout: 30s
    idle_timeout: 1m
    shutdown_timeout: 10s

prometheus:
    base_url: "http://localhost:9090"
    query_timeout: 10s

generation:
    interval: 15s

cache:
    retention: 15m

storage:
    data_dir: data

logging:
    level: info
    format: text

charts:
    - name: chrony_packets_accepted_inline
      title: Chrony packets accepted (inline)
      query: |-
          rate(chrony_serverstats_ntp_packets_received_total[5m])
          -
          rate(chrony_serverstats_ntp_packets_dropped_total[5m])
      lookback: 15m
      step: 15s
      width: 800
      height: 320

    - name: chrony_packets_accepted_file
      title: Chrony packets accepted (file)
      query_file: queries/chrony_packets_accepted.promql
      lookback: 15m
      step: 15s
      width: 800
      height: 320
