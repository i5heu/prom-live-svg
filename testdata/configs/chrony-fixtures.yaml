service:
  name: prom-live-svg
  environment: testing

http:
  listen_addr: ":8080"
  read_header_timeout: 5s
  read_timeout: 10s
  write_timeout: 30s
  idle_timeout: 1m
  shutdown_timeout: 10s

prometheus:
  base_url: "http://prometheus.example.invalid:9090"
  query_timeout: 10s

generation:
  interval: 15s

cache:
  retention: 15m

storage:
  data_dir: testdata/render-cache

logging:
  level: info
  format: text

charts:
  - name: chrony_packets_accepted
    title: Chrony accepted packets per second
    query_file: queries/chrony_packets_accepted.promql
    lookback: 15m
    step: 15s
    width: 800
    height: 320

  - name: chrony_timestamp_span
    title: Chrony timestamp span seconds
    query_file: queries/chrony_timestamp_span.promql
    lookback: 15m
    step: 15s
    width: 800
    height: 320

  - name: chrony_source_offset_by_source
    title: Chrony source offset by source
    query_file: queries/chrony_source_offset_by_source.promql
    lookback: 15m
    step: 15s
    width: 960
    height: 400
